version: '3.8'

services:
  mobile-terminal:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3001" # Unified Web and Relay port
    restart: unless-stopped
    # If the relay needs to SSH into the host machine that Docker is running on,
    # uncomment the following line (Linux only) to allow connection to localhost.
    # network_mode: "host"
